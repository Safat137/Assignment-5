<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue tracker | DashBoard</title>
    <!-- link font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<!-- link css -->
<link rel="stylesheet" href="C.css">
<!-- daisyUI || TaliwindsCss -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <nav class="bg-white border-b px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
    <div class="flex items-center gap-2 font-bold text-lg">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-6" alt="logo">
        <span>GitHub Issues Tracker</span>
    </div>

    <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
        <div class="relative w-full sm:w-64">
            <input type="text" id="searchInput" placeholder="Search issues..." 
                class="border rounded-md px-4 py-1.5 w-full outline-none bg-gray-50 text-sm">
        </div>

        <div class="flex items-center gap-2 w-full sm:w-auto">
            <button id="searchBtn" class="bg-[#1F2937] text-white px-6 py-1.5 rounded-md text-[14px] font-medium flex-1 sm:flex-none">Search</button>
            <button class="bg-[#4F46E5] text-white px-4 py-1.5 rounded-md text-[14px] font-medium flex-1 sm:flex-none whitespace-nowrap">+ New Issue</button>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto mt-10 p-4">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
        
        <div class="flex justify-center gap-2 mb-10">
            <button data-status="all" class="tab-btn bg-[#4F46E5] text-white px-6 py-1.5 rounded-lg text-xs font-bold shadow-sm">All</button>
            <button data-status="open" class="tab-btn bg-white text-gray-500 border border-gray-200 px-6 py-1.5 rounded-lg text-xs font-bold hover:bg-gray-50">Open</button>
            <button data-status="closed" class="tab-btn bg-white text-gray-500 border border-gray-200 px-6 py-1.5 rounded-lg text-xs font-bold hover:bg-gray-50">Closed</button>
        </div>

        <div class="flex justify-between items-end mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-50 p-2.5 rounded-xl border border-indigo-100">
                    <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <h2 id="issueCount" class="text-xl font-extrabold text-gray-900 tracking-tight">0 Issues</h2>
                    <p class="text-xs text-gray-400 font-medium">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-[11px] font-bold tracking-wide">
                <span class="flex items-center gap-1.5 text-gray-600"><span class="w-2.5 h-2.5 rounded-full bg-green-500"></span> OPEN</span>
                <span class="flex items-center gap-1.5 text-gray-600"><span class="w-2.5 h-2.5 rounded-full bg-purple-500"></span> CLOSED</span>
            </div>
        </div>

        <div id="tabLoader" class="hidden flex flex-col items-center justify-center py-20 w-full col-span-full">
    <span class="loading loading-spinner loading-md text-primary"></span>
    <p class="text-xs text-gray-400 mt-2 font-medium uppercase tracking-wider">Loading Issues...</p>
</div>

        <div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 pt-6 border-t border-gray-100">
            </div>
    </div>
</main>
<div id="modalOverlay" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-lg w-full">
            <div id="modalBody" class="p-8"></div>
            <div class="p-4 border-t flex justify-end">
                <button onclick="closeModal()" class="bg-[#4F46E5] text-white px-4 py-1 rounded text-sm">Close</button>
            </div>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
